<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App événementielle BtoC · Karine Timoneda</title>
  <meta name="description" content="Création de 0 d'une application virale dans l'événementiel, cas client détaillé.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="../assets/img/favicon-k.png">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script>
    (function () {
      try {
        var s = localStorage.getItem('karine-theme');
        if (s) { document.documentElement.setAttribute('data-theme', s); return; }
        if (window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>
<div id="header-placeholder"></div>

<main id="main-content">
  <section class="page-hero" aria-labelledby="case-title">
    <div class="hero-orb hero-orb-2" aria-hidden="true" style="width:300px;height:300px;top:-60px;right:-40px;animation-delay:-4s"></div>
    <div class="container">
      <a href="../projets" class="section-label page-hero-label" style="text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;">
        ← Interventions
      </a>
      <h1 class="page-hero-title text-gradient" id="case-title">
        App événementielle BtoC :<br>0 → 1 par les sciences comportementales
      </h1>
      <p class="page-hero-desc">
        Ce cas client est en cours de rédaction. Revenez bientôt.
      </p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="expectations-block reveal" style="max-width:640px;margin:0 auto;text-align:center;padding:var(--space-2xl) var(--space-md)">
        <p style="font-size:3rem;margin-bottom:var(--space-md)">🚧</p>
        <p style="font-size:var(--text-lg);color:var(--text-secondary);line-height:1.75">
          Ce cas est en cours de rédaction.<br>
          Vous souhaitez en savoir plus dès maintenant ?
        </p>
        <div class="cta-buttons" style="margin-top:var(--space-md)">
          <a href="https://calendar.app.google/DLCuiwxWRqKBqRqp9" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Parlons-en directement →</a>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>
<script src="../assets/js/components.js"></script>
<script src="../assets/js/main.js"></script>
</body>
</html>
